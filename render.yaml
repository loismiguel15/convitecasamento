services:
  - type: web
    name: convite-casamento
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/settings
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
