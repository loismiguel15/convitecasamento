services:
  - type: web
    name: convite-casamento
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/settings
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: wedding-data
      mountPath: /var/data
      sizeGB: 1
